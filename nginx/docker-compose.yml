# Run from this directory: docker-compose up -d
# Nginx runs outside MISP network; reaches services via host (host.docker.internal).
# Ensure main stack is up first so ports 8443, 9200, 5601 are bound on the host.
# Generate SSL certs first: ./ssl/gen-certs.sh
services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
