# MISP - proxy to host HTTPS (host.docker.internal:8443)
# Add to /etc/hosts: 127.0.0.1 misp.local
# Main stack must expose 8443:443 for MISP.
server {
    listen 80;
    server_name misp.local;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name misp.local;
    include /etc/nginx/conf.d/ssl-common.conf;

    location / {
        proxy_pass https://host.docker.internal:8443;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
