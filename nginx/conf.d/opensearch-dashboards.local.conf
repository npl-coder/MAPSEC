# OpenSearch Dashboards - proxy to host (host.docker.internal:5601)
# Add to /etc/hosts: 127.0.0.1 opensearch-dashboards.local
# Main stack must expose 5601:5601.
server {
    listen 80;
    server_name opensearch-dashboards.local;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name opensearch-dashboards.local;
    include /etc/nginx/conf.d/ssl-common.conf;

    location / {
        proxy_pass http://host.docker.internal:5601;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
