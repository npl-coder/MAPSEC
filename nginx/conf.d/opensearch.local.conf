# OpenSearch API - proxy to host (host.docker.internal:9200)
# Add to /etc/hosts: 127.0.0.1 opensearch.local
# Main stack must expose 9200:9200.
server {
    listen 80;
    server_name opensearch.local;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name opensearch.local;
    include /etc/nginx/conf.d/ssl-common.conf;

    location / {
        proxy_pass http://host.docker.internal:9200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_read_timeout 90s;
    }
}
